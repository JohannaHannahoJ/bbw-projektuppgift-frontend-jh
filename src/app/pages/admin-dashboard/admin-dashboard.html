<div>
    <h2>Adminpanelen</h2>
</div>
<p class="welcome">{{ message() }}</p>

<button type="button" (click)="logout()">
    Logga ut
</button>

<button (click)="activeSection = 'menu'">
  Meny
</button>

<button (click)="activeSection = 'categories'">
  Kategorier
</button>

<button (click)="activeSection = 'add'">
  Lägg till rätt
</button>

<hr>

@if(activeSection === 'menu') {
  <app-menu-management></app-menu-management>
}

@if(activeSection === 'categories') {
  <app-category-management></app-category-management>
}

@if(activeSection === 'add') {
  <app-menu-form></app-menu-form>
}

<div>
  <app-message-list></app-message-list>
</div>
