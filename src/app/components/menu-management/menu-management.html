<h2>Redigera meny</h2>

@if (selectedItem) {
  <app-menu-form [selectedItem]="selectedItem" (closeEdit)="selectedItem = null"></app-menu-form>
}

@for(item of menuItems(); track item.id) {

<div>

  <h3>{{ item.name }}</h3>

  <p>{{ item.description }}</p>

  <p>{{ item.price }} kr</p>

  <button (click)="editItem(item)">
    Redigera
  </button>

  <button (click)="deleteItem(item.id!)">
    Ta bort
  </button>

</div>
}
